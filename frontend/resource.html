<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Resource | Disaster Alert System</title>


<style>
:root {
  --bg: #06152d;
  --bg2: #0d2347;
  --panel: rgba(255, 255, 255, 0.08);
  --panel-border: rgba(255, 255, 255, 0.12);
  --text: #f8fbff;
  --muted: #d2e0f2;
  --blue: #1d4ed8;
  --blue2: #2563eb;
  --teal: #0f766e;
  --teal2: #14b8a6;
  --orange: #c2410c;
  --orange2: #f97316;
  --shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at top left, rgba(37, 99, 235, 0.35), transparent 30%),
    radial-gradient(circle at top right, rgba(20, 184, 166, 0.2), transparent 26%),
    linear-gradient(135deg, var(--bg), var(--bg2));
  min-height: 100vh;
}
a { text-decoration: none; color: inherit; }
.navbar {
  position: sticky;
  top: 0;
  z-index: 100;
  padding: 18px 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 18px;
  background: rgba(4, 13, 29, 0.72);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(255, 255, 255, 0.08);
}
.logo { font-size: 20px; font-weight: 700; letter-spacing: 0.4px; }
.nav-links { display: flex; flex-wrap: wrap; gap: 10px; }
.nav-links a {
  padding: 10px 14px;
  border-radius: 999px;
  color: #d9e6f7;
  transition: 0.2s ease;
}
.nav-links a:hover, .nav-links a.active {
  background: rgba(255, 255, 255, 0.12);
  color: white;
}
.hero-section {
  position: relative;
  min-height: 72vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background:
    linear-gradient(rgba(4, 13, 29, 0.45), rgba(4, 13, 29, 0.7)),
    url('https://images.unsplash.com/photo-1527489377706-5bf97e608852?auto=format&fit=crop&w=1500&q=80') center/cover no-repeat;
}
.hero-content {
  position: relative;
  z-index: 2;
  max-width: 920px;
  text-align: center;
  padding: 24px;
}
.badge {
  display: inline-block;
  margin-bottom: 16px;
  padding: 8px 14px;
  border-radius: 999px;
  background: rgba(20, 184, 166, 0.18);
  border: 1px solid rgba(20, 184, 166, 0.28);
  color: #dffdfa;
  font-size: 14px;
}
.hero-content h1 {
  margin: 0 0 18px;
  font-size: 54px;
  line-height: 1.1;
}
.hero-content p {
  margin: 0 auto 26px;
  max-width: 760px;
  color: #e3edf9;
  font-size: 18px;
  line-height: 1.7;
}
.hero-actions {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
}
.page-header {
  min-height: 230px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 28px 20px;
  text-align: center;
  background: linear-gradient(135deg, rgba(29, 78, 216, 0.32), rgba(20, 184, 166, 0.16));
}
.page-header.compact { min-height: 180px; }
.page-header-content { max-width: 820px; }
.page-header h1 {
  margin: 0 0 12px;
  font-size: 42px;
}
.page-header p {
  margin: 0;
  color: #deebfb;
  font-size: 17px;
  line-height: 1.7;
}
.report-bg { background: linear-gradient(135deg, rgba(217, 70, 239, 0.18), rgba(37, 99, 235, 0.25)); }
.volunteer-bg { background: linear-gradient(135deg, rgba(20, 184, 166, 0.25), rgba(37, 99, 235, 0.18)); }
.resource-bg { background: linear-gradient(135deg, rgba(249, 115, 22, 0.2), rgba(29, 78, 216, 0.22)); }
.search-bg { background: linear-gradient(135deg, rgba(16, 185, 129, 0.18), rgba(59, 130, 246, 0.2)); }
.container {
  width: min(1200px, calc(100% - 40px));
  margin: 0 auto;
  padding: 32px 0 60px;
}
.container.narrow { width: min(800px, calc(100% - 40px)); }
.panel {
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: 24px;
  padding: 24px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(12px);
}
.form-panel { padding: 28px; }
.panel h2, .panel h3 { margin-top: 0; }
.panel-subtitle { color: var(--muted); margin-top: 6px; }
.top-actions, .feature-grid, .split-grid, .results-layout, .nav-cards {
  display: grid;
  gap: 20px;
}
.top-actions, .feature-grid {
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  margin-bottom: 28px;
}
.split-grid {
  grid-template-columns: 1fr 1fr;
  margin-top: 28px;
}
.results-layout {
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  margin-top: 24px;
}
.action-card, .feature-card, .mini-nav-card {
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 22px;
  padding: 22px;
  transition: transform 0.2s ease, background 0.2s ease;
}
.action-card:hover, .feature-card:hover, .mini-nav-card:hover {
  transform: translateY(-4px);
  background: rgba(255, 255, 255, 0.12);
}
.feature-icon { font-size: 28px; margin-bottom: 12px; }
.action-card h3, .feature-card h3 { margin: 0 0 10px; }
.action-card p, .feature-card p, .mini-nav-card, .nice-list li {
  color: var(--muted);
  line-height: 1.6;
}
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}
.stat-card {
  padding: 24px;
  border-radius: 22px;
  color: white;
}
.stat-card span { display: block; margin-bottom: 10px; opacity: 0.9; }
.stat-card h3 { font-size: 44px; margin: 0; }
.stat-card.blue { background: linear-gradient(135deg, var(--blue), var(--blue2)); }
.stat-card.teal { background: linear-gradient(135deg, var(--teal), var(--teal2)); }
.stat-card.orange { background: linear-gradient(135deg, var(--orange), var(--orange2)); }
.panel-header {
  display: flex;
  justify-content: space-between;
  gap: 20px;
  align-items: center;
  margin-bottom: 18px;
}
.btn {
  border: none;
  padding: 13px 18px;
  border-radius: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: 0.2s ease;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.btn.primary {
  background: linear-gradient(135deg, var(--blue2), var(--blue));
  color: white;
}
.btn.secondary {
  background: linear-gradient(135deg, var(--teal2), var(--teal));
  color: white;
}
.btn:hover {
  transform: translateY(-1px);
  filter: brightness(1.05);
}
.full-width { width: 100%; }
.location-status {
  margin-bottom: 20px;
  padding: 12px 16px;
  border-radius: 14px;
  background: rgba(20, 184, 166, 0.14);
  color: #ddfffb;
  border: 1px solid rgba(20, 184, 166, 0.22);
}
.form-layout { display: grid; gap: 18px; }
.input-group { display: grid; gap: 8px; }
label { font-weight: 600; color: #edf5ff; }
input, textarea, select {
  width: 100%;
  padding: 14px 16px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.07);
  color: white;
  font-size: 15px;
  outline: none;
}
select { color: white; }
option { color: black; }
input::placeholder, textarea::placeholder { color: #b7c8e0; }
.search-form-row {
  display: grid;
  grid-template-columns: 1fr 1fr auto;
  gap: 18px;
  align-items: end;
}
.search-button-wrap { display: flex; align-items: end; }
.map-panel { margin-top: 24px; }
#map {
  width: 100%;
  height: 460px;
  border-radius: 18px;
  overflow: hidden;
  margin-top: 12px;
}
.results-box {
  display: grid;
  gap: 14px;
  max-height: 520px;
  overflow: auto;
  padding-right: 4px;
}
.result-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 18px;
  padding: 16px;
}
.result-card h4 { margin: 0 0 10px; color: white; }
.result-card p {
  margin: 6px 0;
  color: #d6e4f6;
  line-height: 1.5;
  word-break: break-word;
}
.empty-state { color: var(--muted); font-style: italic; }
.nice-list {
  margin: 0;
  padding-left: 18px;
  display: grid;
  gap: 10px;
}
@media (max-width: 980px) {
  .stats-grid, .split-grid, .search-form-row { grid-template-columns: 1fr; }
  .panel-header, .navbar { flex-direction: column; align-items: flex-start; }
  .hero-content h1 { font-size: 38px; }
}
@media (max-width: 640px) {
  .container { width: min(100% - 24px, 1200px); }
  .hero-content h1, .page-header h1 { font-size: 30px; }
  .nav-links { gap: 6px; }
  .nav-links a { padding: 8px 10px; font-size: 14px; }
}
</style>

</head>
<body data-page="resource">
  <nav class="navbar">
    <div class="logo">Disaster Alert System</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="report.html">Report</a>
      <a href="volunteer.html">Volunteers</a>
      <a href="resource.html" class="active">Resources</a>
      <a href="search.html">Search</a>
    </div>
  </nav>

  <header class="page-header resource-bg">
    <div class="page-header-content">
      <h1>Add Resource</h1>
      <p>Add useful emergency resources, quantities, and contact details for affected areas.</p>
    </div>
  </header>

  <main class="container narrow">
    <section class="panel form-panel">
      <div class="location-status" id="locationStatus">Detecting coordinates...</div>

      <form id="resourceForm" class="form-layout">
        <div class="input-group">
          <label for="resourceName">Resource Name</label>
          <input type="text" id="resourceName" placeholder="Food Packets, Water, Medicine..." required />
        </div>

        <div class="input-group">
          <label for="quantity">Quantity</label>
          <input type="number" id="quantity" placeholder="Enter quantity" required />
        </div>

        <div class="input-group">
          <label for="contactPerson">Contact Person</label>
          <input type="text" id="contactPerson" placeholder="Contact person" required />
        </div>

        <div class="input-group">
          <label for="contactPhone">Contact Phone</label>
          <input type="text" id="contactPhone" placeholder="Phone number" required />
        </div>

        <div class="input-group">
          <label for="resourcePlace">Place</label>
          <input type="text" id="resourcePlace" placeholder="Enter place" required />
        </div>

        <button type="submit" class="btn primary full-width">Add Resource</button>
      </form>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
